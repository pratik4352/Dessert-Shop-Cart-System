<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="icon" type="image/png" sizes="32x32" href="./assets/images/favicon-32x32.png" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Red+Hat+Text:wght@400;600;700&display=swap" rel="stylesheet" />
  <title>Frontend Mentor | Product list with cart</title>

  <style>
    :root {
      --color-red: hsl(14, 86%, 42%);
      --color-green: hsl(159, 69%, 38%);
      --color-rose-50: hsl(20, 50%, 98%);
      --color-rose-100: hsl(13, 31%, 94%);
      --color-rose-300: hsl(14, 25%, 72%);
      --color-rose-400: hsl(7, 20%, 60%);
      --color-rose-500: hsl(12, 20%, 44%);
      --color-rose-900: hsl(14, 65%, 9%);
      --radius: 16px;
      --shadow: 0 15px 40px rgba(0, 0, 0, 0.1);
      --max-content-width: 1200px;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: 'Red Hat Text', system-ui, -apple-system, Segoe UI, sans-serif;
      background: radial-gradient(circle at 15% 15%, var(--color-rose-50), #fff 50%);
      color: var(--color-rose-900);
      min-height: 100vh;
      line-height: 1.35;
    }

    h1, h2, h3 {
      margin: 0;
      color: var(--color-rose-900);
    }

    h1 {
      font-size: clamp(1.4rem, 2.2vw, 2rem);
      font-weight: 700;
      margin-bottom: 0.8rem;
    }

    .page {
      display: grid;
      gap: 1.5rem;
      max-width: var(--max-content-width);
      margin: 0 auto;
      padding: 1rem;
    }

    .top-grid {
      display: grid;
      grid-template-columns: 1fr;
      gap: 1rem;
      align-items: start;
    }

    .products,
    .cart {
      background: #fff;
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      padding: 1rem;
    }

    .products {
      min-height: 600px;
    }

    .product-grid {
      display: grid;
      gap: 1rem;
    }

    .product-card {
      background: white;
      border-radius: 16px;
      overflow: hidden;
      border: 1px solid transparent;
      position: relative;
      transition: transform 0.2s ease, border-color 0.2s ease;
    }

    .product-card:focus-within,
    .product-card:hover {
      border-color: var(--color-rose-300);
      transform: translateY(-2px);
    }

    .product-card img {
      width: 100%;
      display: block;
      object-fit: cover;
      aspect-ratio: 4 / 3;
    }

    .product-content {
      padding: 0.9rem;
    }

    .product-category {
      margin: 0;
      font-size: 0.8rem;
      color: var(--color-rose-400);
    }

    .product-name {
      margin: 0.25rem 0;
      font-size: 1rem;
      font-weight: 700;
      color: var(--color-rose-900);
    }

    .product-price {
      font-size: 1rem;
      font-weight: 700;
      color: var(--color-red);
    }

    .product-action,
    .product-qty {
      margin-top: 0.75rem;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 0.5rem;
    }

    .btn,
    button {
      font: inherit;
      cursor: pointer;
      border: 0;
      border-radius: 8px;
      transition: transform 0.15s ease, background-color 0.15s ease;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 0.4rem;
    }

    .btn-primary {
      background: var(--color-rose-900);
      color: white;
      padding: 0.55rem 1rem;
      font-weight: 700;
    }

    .btn-primary:hover,
    .btn-primary:focus-visible {
      background: var(--color-rose-500);
      transform: translateY(-1px);
    }

    .btn-ghost {
      background: #fff;
      color: var(--color-rose-900);
      border: 1px solid var(--color-rose-300);
      padding: 0.5rem 0.75rem;
      min-width: 2.5rem;
    }

    .btn-ghost:hover,
    .btn-ghost:focus-visible {
      background: var(--color-rose-50);
      border-color: var(--color-rose-500);
    }

    .quantity-control {
      background: var(--color-rose-100);
      border: 1px solid var(--color-rose-300);
      border-radius: 999px;
      padding: 0.25rem 0.5rem;
      min-width: 120px;
    }

    .quantity-control button {
      background: transparent;
      color: var(--color-rose-900);
      font-size: 1rem;
      width: 28px;
      height: 28px;
      border-radius: 50%;
      border: 1px solid var(--color-rose-300);
      padding: 0;
    }

    .quantity-control span {
      min-width: 30px;
      text-align: center;
      font-weight: 700;
    }

    .cart {
      display: flex;
      flex-direction: column;
      gap: 1rem;
    }

    .cart-head {
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .cart-head h2 {
      margin: 0;
      font-size: 1.25rem;
    }

    .cart-items {
      list-style: none;
      padding: 0;
      margin: 0;
      display: flex;
      flex-direction: column;
      gap: 0.75rem;
    }

    .cart-item {
      display: flex;
      justify-content: space-between;
      padding: 0.6rem;
      border-radius: 12px;
      background: var(--color-rose-50);
      border: 1px solid var(--color-rose-100);
      align-items: center;
      gap: 1rem;
    }

    .cart-item small {
      color: var(--color-rose-400);
    }

    .cart-line {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 0.5rem;
      flex: 1;
      min-width: 0;
    }

    .cart-total {
      display: flex;
      justify-content: space-between;
      font-size: 1.2rem;
      font-weight: 700;
      padding: 0.4rem 0.3rem;
      border-top: 1px solid var(--color-rose-100);
    }

    .cart-footer {
      display: flex;
      flex-direction: column;
      gap: 0.75rem;
      align-items: stretch;
    }

    .carbon {
      color: var(--color-green);
      display: flex;
      align-items: center;
      gap: 0.5rem;
      font-size: 0.9rem;
      font-weight: 600;
    }

    .cart .confirm-btn {
      background: var(--color-red);
      border-radius: 10px;
      color: #fff;
      padding: 0.75rem;
      font-weight: 700;
      border: 0;
      width: 100%;
    }

    .cart .confirm-btn:hover,
    .cart .confirm-btn:focus-visible {
      background: hsl(14, 82%, 36%);
    }

    .empty-state {
      text-align: center;
      color: var(--color-rose-400);
      min-height: 160px;
      display: grid;
      place-items: center;
      gap: 0.5rem;
    }

    .empty-state img {
      width: 120px;
      height: auto;
    }

    .modal-overlay {
      position: fixed;
      inset: 0;
      background: rgba(0, 0, 0, 0.35);
      display: none;
      align-items: center;
      justify-content: center;
      z-index: 25;
      padding: 1rem;
    }

    .modal-overlay.active {
      display: flex;
    }

    .modal {
      width: min(360px, 100%);
      background: #fff;
      border-radius: 20px;
      padding: 1.8rem;
      text-align: center;
      box-shadow: var(--shadow);
    }

    .modal img {
      width: 56px;
      margin-bottom: 0.8rem;
    }

    .modal h3 {
      margin: 0 0 0.5rem;
      font-size: 1.4rem;
    }

    .modal p {
      margin: 0 0 1rem;
      color: var(--color-rose-400);
    }

    .modal button {
      width: 100%;
      background: var(--color-rose-900);
      color: #fff;
      border-radius: 8px;
      padding: 0.7rem;
    }

    .attribution {
      font-size: 0.75rem;
      text-align: center;
      color: var(--color-rose-400);
      margin-top: 1rem;
    }

    .attribution a {
      color: var(--color-rose-500);
      text-decoration: none;
    }

    @media (min-width: 768px) {
      .top-grid {
        grid-template-columns: 2fr 1fr;
      }

      .products {
        min-height: 700px;
      }

      .product-grid {
        grid-template-columns: repeat(2, minmax(0, 1fr));
      }
    }

    @media (min-width: 1024px) {
      .page {
        gap: 2rem;
        padding: 2rem;
      }

      .product-grid {
        grid-template-columns: repeat(3, minmax(0, 1fr));
      }

      .products {
        padding: 1.5rem;
      }

      .cart {
        height: fit-content;
      }
    }
  </style>
</head>
<body>
  <main class="page" aria-label="Dessert shopping page">
    <section class="products" aria-labelledby="products-heading">
      <h1 id="products-heading">Desserts</h1>
      <div id="productGrid" class="product-grid" aria-live="polite"></div>
    </section>

    <aside class="cart" aria-labelledby="cart-heading">
      <div class="cart-head">
        <h2 id="cart-heading">Your Cart (<span id="cartCount">0</span>)</h2>
        <button id="clearCart" class="btn btn-ghost" aria-label="Start new order">Start New Order</button>
      </div>
      <ul id="cartItems" class="cart-items"></ul>
      <div id="emptyMessage" class="empty-state">
        <img src="./assets/images/illustration-empty-cart.svg" alt="Empty cart illustration" />
        <p>Your added items will appear here</p>
      </div>
      <div id="cartSummary" class="cart-footer" style="display:none;">
        <div class="cart-total">
          <span>Order Total</span>
          <span id="cartTotal">$0.00</span>
        </div>
        <div class="carbon">
          <img src="./assets/images/icon-carbon-neutral.svg" alt="Carbon neutral icon" width="18" />
          <span>This is a carbon-neutral delivery</span>
        </div>
        <button id="confirmOrder" class="cart-btn confirm-btn">Confirm Order</button>
      </div>
    </aside>
  </main>

  <div id="modal" class="modal-overlay" role="dialog" aria-modal="true" aria-labelledby="modal-title" aria-describedby="modal-desc">
    <div class="modal">
      <img src="./assets/images/icon-order-confirmed.svg" alt="Order Confirmed" />
      <h3 id="modal-title">Order Confirmed</h3>
      <p id="modal-desc">Your order is on its way. Enjoy your desserts!</p>
      <button id="modalClose">Start New Order</button>
    </div>
  </div>

  <footer class="attribution">
    Challenge by <a href="https://www.frontendmentor.io?ref=challenge" target="_blank" rel="noopener noreferrer">Frontend Mentor</a>.
    Coded by <a href="#">Your Name Here</a>.
  </footer>

  <script>
    const productGrid = document.getElementById('productGrid');
    const cartItemsList = document.getElementById('cartItems');
    const cartCount = document.getElementById('cartCount');
    const cartTotal = document.getElementById('cartTotal');
    const emptyMessage = document.getElementById('emptyMessage');
    const cartSummary = document.getElementById('cartSummary');
    const clearCartBtn = document.getElementById('clearCart');
    const confirmOrderBtn = document.getElementById('confirmOrder');
    const modal = document.getElementById('modal');
    const modalCloseBtn = document.getElementById('modalClose');

    let products = [];
    const cart = new Map();

    function formatCurrency(value) {
      return `$${value.toFixed(2)}`;
    }

    function renderProducts() {
      productGrid.innerHTML = products
        .map((product, index) => {
          const productItem = cart.get(index);
          return `
            <article class="product-card" data-id="${index}">
              <img src="${product.image.desktop}" alt="${product.name}" loading="lazy" />
              <div class="product-content">
                <p class="product-category">${product.category}</p>
                <h3 class="product-name">${product.name}</h3>
                <p class="product-price">${formatCurrency(product.price)}</p>
                <div class="product-action">
                  ${productItem
                    ? `<div class="quantity-control" aria-label="${product.name} quantity">
                        <button type="button" aria-label="Decrease quantity" data-action="decrease" data-id="${index}">-</button>
                        <span>${productItem.quantity}</span>
                        <button type="button" aria-label="Increase quantity" data-action="increase" data-id="${index}">+</button>
                      </div>`
                    : `<button type="button" class="btn btn-primary" data-action="add" data-id="${index}">
                        <img src="./assets/images/icon-add-to-cart.svg" alt="" aria-hidden="true" width="18" />
                        Add to Cart
                      </button>`}
                </div>
              </div>
            </article>
          `;
        })
        .join('');
    }

    function generateCartItem(productId, item) {
      const { name, price } = products[productId];
      const subTotal = price * item.quantity;
      return `
        <li class="cart-item" data-id="${productId}">
          <div class="cart-line">
            <div>
              <strong>${name}</strong>
              <small>${formatCurrency(price)} x ${item.quantity}</small>
            </div>
            <div>${formatCurrency(subTotal)}</div>
          </div>
          <button class="btn btn-ghost" aria-label="Remove ${name}" data-action="remove" data-id="${productId}">×</button>
        </li>
      `;
    }

    function updateCartState() {
      const totalItems = Array.from(cart.values()).reduce((sum, next) => sum + next.quantity, 0);
      const totalValue = Array.from(cart.entries()).reduce((sum, [id, item]) => sum + products[id].price * item.quantity, 0);

      cartCount.textContent = totalItems;
      cartTotal.textContent = formatCurrency(totalValue);

      if (totalItems === 0) {
        cartItemsList.innerHTML = '';
        emptyMessage.style.display = 'grid';
        cartSummary.style.display = 'none';
      } else {
        cartItemsList.innerHTML = Array.from(cart.entries()).map(([id, item]) => generateCartItem(id, item)).join('');
        emptyMessage.style.display = 'none';
        cartSummary.style.display = 'flex';
      }

      renderProducts();
    }

    function addToCart(productId) {
      if (!cart.has(productId)) {
        cart.set(productId, { quantity: 1 });
      } else {
        const current = cart.get(productId);
        cart.set(productId, { quantity: current.quantity + 1 });
      }
      updateCartState();
    }

    function decreaseQuantity(productId) {
      if (!cart.has(productId)) return;
      const current = cart.get(productId);
      if (current.quantity <= 1) {
        cart.delete(productId);
      } else {
        cart.set(productId, { quantity: current.quantity - 1 });
      }
      updateCartState();
    }

    function removeFromCart(productId) {
      cart.delete(productId);
      updateCartState();
    }

    function clearCart() {
      cart.clear();
      updateCartState();
    }

    productGrid.addEventListener('click', (event) => {
      const button = event.target.closest('button');
      if (!button) return;
      const action = button.dataset.action;
      const id = Number(button.dataset.id);
      if (action === 'add') addToCart(id);
      if (action === 'increase') addToCart(id);
      if (action === 'decrease') decreaseQuantity(id);
    });

    cartItemsList.addEventListener('click', (event) => {
      const button = event.target.closest('button');
      if (!button) return;
      const action = button.dataset.action;
      const id = Number(button.dataset.id);
      if (action === 'remove') removeFromCart(id);
    });

    clearCartBtn.addEventListener('click', clearCart);

    let lastFocusedElement = null;

    const focusableSelectors = 'button, [href], input, select, textarea, [tabindex]:not([tabindex="-1"])';
    function getModalFocusable() {
      return Array.from(modal.querySelectorAll(focusableSelectors)).filter((el) => !el.hasAttribute('disabled'));
    }

    function trapFocus(event) {
      if (event.key !== 'Tab') return;
      const focusable = getModalFocusable();
      if (!focusable.length) return;

      const firstEl = focusable[0];
      const lastEl = focusable[focusable.length - 1];
      const isShift = event.shiftKey;

      if (!modal.contains(document.activeElement)) {
        event.preventDefault();
        firstEl.focus();
        return;
      }

      if (!isShift && document.activeElement === lastEl) {
        event.preventDefault();
        firstEl.focus();
      } else if (isShift && document.activeElement === firstEl) {
        event.preventDefault();
        lastEl.focus();
      }
    }

    function closeModal() {
      modal.classList.remove('active');
      window.removeEventListener('keydown', onModalKeyDown);
      if (lastFocusedElement) {
        lastFocusedElement.focus();
        lastFocusedElement = null;
      }
      clearCart();
    }

    function onModalKeyDown(event) {
      if (event.key === 'Escape') {
        event.preventDefault();
        closeModal();
        return;
      }
      trapFocus(event);
    }

    function openModal() {
      if (cart.size === 0) return;
      lastFocusedElement = document.activeElement;
      modal.classList.add('active');
      window.addEventListener('keydown', onModalKeyDown);

      const focusable = getModalFocusable();
      if (focusable.length) {
        focusable[0].focus();
      }
    }

    confirmOrderBtn.addEventListener('click', openModal);
    modalCloseBtn.addEventListener('click', closeModal);

    window.addEventListener('click', (event) => {
      if (event.target === modal) {
        closeModal();
      }
    });

    async function loadData() {
      try {
        const res = await fetch('./data.json');
        if (!res.ok) throw new Error('data load failed');
        products = await res.json();
        renderProducts();
      } catch (error) {
        productGrid.innerHTML = '<p>Could not load products. Please try again later.</p>';
        console.error(error);
      }
    }

    loadData();
  </script>
</body>
</html>
